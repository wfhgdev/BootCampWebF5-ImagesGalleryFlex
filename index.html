<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox William Hernándezt</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
  <h1>Responsive Image Gallery by William Hernández</h1>
  <div class="gallery">
    <div class="card">
      <img src="images/mountainriver.jpg" alt="Mountain river valley" />
      <p>Mountain river valley</p>
    </div>
 
    <div class="card">
      <img src="images/rainforest.jpg" alt="Chiapas rainforest" />
      <p>Chiapas rainforest</p>
    </div>
 
    <div class="card">
      <img src="images/aurora.jpg" alt="The Aurora Borealis shines above Bear Lake" />
      <p>The Aurora Borealis</p>
    </div>
 
    <div class="card">
      <img src="images/lake.jpg" alt="The crater lake of Mount in Indonesia" />
      <p>The crater lake of Mount in Indonesia</p>
    </div>
 
    <div class="card">
      <img src="images/snow_forest.JPG" alt="Snow forest near Russia" />
      <p>Snow forest near Russia</p>
    </div>
 
    <div class="card">
      <img src="images/sunset.jpg" alt="Two minutes before the Sun disappears below the horizon" />
      <p>The Sun disappears below the horizon</p>
    </div>
 
    <div class="card">
      <img src="images/waterfall.JPG" alt="Waterfall in Iceland" />
      <p>Waterfall in Iceland</p>
    </div>
 
    <div class="card">
      <img src="images/desert.JPG" alt="Desert sand dunes" />
      <p>Desert sand dunes</p>
    </div>
 
  </div>
</body>
</html>
